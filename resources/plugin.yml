name: ${name}
version: ${version}
description: ${description}
authors: [Gecolay]
website: https://www.spigotmc.org/resources/62325
main: ${main}
api-version: 1.16
folia-supported: true
softdepend: [GriefPrevention, PlaceholderAPI, PlotSquared, WorldGuard]

commands:

  gsit:

    usage: /<command> [toggle|playertoggle]
    aliases: [sit]
    description: Sit command

  glay:

    usage: /<command>
    aliases: [lay]
    description: Lay command
    permission: GSit.Lay

  gbellyflop:

    usage: /<command>
    aliases: [bellyflop]
    description: BellyFlop command
    permission: GSit.BellyFlop

  gspin:

    usage: /<command>
    aliases: [spin]
    description: Spin command
    permission: GSit.Spin

  gcrawl:

    usage: /<command> [toggle]
    aliases: [crawl]
    description: Crawl command

  gsitreload:

    usage: /<command>
    aliases: [gsitrl]
    description: Plugin reload command
    permission: GSit.Reload

permissions:

  GSit.*:
    default: op
    description: GSit | Permissions
    children:
      GSit.Sit.*: true
      GSit.PlayerSit.*: true
      GSit.Pose.*: true
      GSit.Crawl.*: true
      GSit.Toggle.*: true
      GSit.Kick.*: true
      GSit.ByPass.*: true
      GSit.Update: true
      GSit.Reload: true

  GSit.Sit.*:
    default: op
    description: Sit | Permissions
    children:
      GSit.Sit: true
      GSit.SitClick: true
      GSit.Toggle.Sit: true
      GSit.Toggle.Other.Sit: true
      GSit.Kick.Sit: true
      GSit.Kick.Command.Sit: true

  GSit.Sit:
    default: true
    description: Sit command | Permission

  GSit.SitClick:
    default: true
    description: Sit click ability | Permission

  GSit.PlayerSit.*:
    default: op
    description: PlayerSit | Permissions
    children:
      GSit.PlayerSit: true
      GSit.Toggle.PlayerSit: true
      GSit.Toggle.Other.PlayerSit: true

  GSit.PlayerSit:
    default: true
    description: PlayerSit click ability | Permission

  GSit.Pose.*:
    default: op
    description: Pose | Permissions
    children:
      GSit.Lay: true
      GSit.BellyFlop: true
      GSit.Spin: true
      GSit.Kick.Pose: true
      GSit.Kick.Command.Pose: true

  GSit.Lay:
    default: true
    description: Lay command | Permission

  GSit.BellyFlop:
    default: true
    description: BellyFlop command | Permission

  GSit.Spin:
    default: true
    description: Spin command | Permission

  GSit.Crawl.*:
    default: op
    description: Crawl | Permissions
    children:
      GSit.Crawl: true
      GSit.CrawlSneak: true
      GSit.Toggle.Crawl: true
      GSit.Toggle.Other.Crawl: true

  GSit.Crawl:
    default: true
    description: Crawl command | Permission

  GSit.CrawlSneak:
    default: true
    description: Crawl sneak ability | Permission

  GSit.Toggle.*:
    default: op
    description: Kick | Permissions
    children:
      GSit.Toggle.Sit: true
      GSit.Toggle.Other.Sit: true
      GSit.Toggle.PlayerSit: true
      GSit.Toggle.Other.PlayerSit: true
      GSit.Toggle.Crawl: true
      GSit.Toggle.Other.Crawl: true

  GSit.Toggle.Sit:
    default: true
    description: Toggle sit click ability command | Permission

  GSit.Toggle.Other.Sit:
    default: true
    description: Toggle other sit click ability command | Permission

  GSit.Toggle.PlayerSit:
    default: true
    description: Toggle PlayerSit click ability command | Permission

  GSit.Toggle.Other.PlayerSit:
    default: true
    description: Toggle other PlayerSit click ability command | Permission

  GSit.Toggle.Crawl:
    default: true
    description: Toggle crawl sneak ability command | Permission

  GSit.Toggle.Other.Crawl:
    default: true
    description: Toggle other crawl sneak ability command | Permission

  GSit.Kick.*:
    default: op
    description: Kick | Permissions
    children:
      GSit.Kick.Sit: true
      GSit.Kick.Command.Sit: true
      GSit.Kick.Pose: true
      GSit.Kick.Command.Pose: true

  GSit.Kick.Sit:
    default: op
    description: Kick sit | Permission

  GSit.Kick.Command.Sit:
    default: op
    description: Kick sit by command | Permission

  GSit.Kick.Pose:
    default: op
    description: Kick pose | Permission

  GSit.Kick.Command.Pose:
    default: op
    description: Kick pose by command | Permission

  GSit.ByPass.*:
    default: op
    description: ByPass | Permissions
    children:
      GSit.ByPass.World: true
      GSit.ByPass.Region: true

  GSit.ByPass.World:
    default: op
    description: ByPass world restrictions | Permission

  GSit.ByPass.Region:
    default: op
    description: ByPass region restrictions | Permission

  GSit.Update:
    default: op
    description: Receive update notification | Permission

  GSit.Reload:
    default: op
    description: Plugin reload command | Permission